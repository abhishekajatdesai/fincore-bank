apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: fincore
type: Opaque
stringData:
  DB_PASSWORD: bank_password
  JWT_SECRET: 9f44c9c0ae9b4f5ea281d79c2d48f7a9c1e61735b0f22a60dfd1c1ba9275f9d1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: fincore
data:
  SERVER_PORT: "8081"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "bank_db"
  DB_USER: "bank_user"
  JWT_EXPIRATION: "86400000"
  JPA_DDL_AUTO: "update"
  JPA_SHOW_SQL: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fincore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: fincore-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fincore
spec:
  selector:
    app: backend
  ports:
    - port: 8081
      targetPort: 8081
