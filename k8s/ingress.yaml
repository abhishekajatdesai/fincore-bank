apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fincore-ingress
  namespace: fincore
spec:
  ingressClassName: nginx
  rules:
    - host: fincore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
